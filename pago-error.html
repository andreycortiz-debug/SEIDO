<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Error de pago en SEIDO.">
    <meta name="theme-color" content="#7b5a2a">
    <meta property="og:title" content="SEIDO | Error de pago">
    <meta property="og:description" content="No se pudo confirmar el pago. Reintenta el pedido en SEIDO.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CO">
    <meta property="og:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <meta property="og:url" content="/pago-error.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SEIDO | Error de pago">
    <meta name="twitter:description" content="No se confirmo el pago. Reintenta con otro metodo.">
    <meta name="twitter:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <link rel="canonical" href="/pago-error.html">
    <link rel="icon" type="image/png" sizes="32x32" href="Assets/Img/logo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Assets/Img/logo/favicon-16.png">
    <link rel="apple-touch-icon" href="Assets/Img/logo/apple-touch-icon.png">
    <title>SEIDO | Error de pago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.min.css">
</head>
<body>
    <div class="page-patterns" aria-hidden="true"></div>

    <main class="thanks-main">
        <section class="thanks-card panel-prominent">
            <div class="brand-spotlight is-compact">
                <picture>
                    <source
                        type="image/avif"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.avif 320w, Assets/Img/logo/logo-fondo-transparente-640.avif 640w"
                        sizes="(max-width: 760px) 44vw, 146px">
                    <source
                        type="image/webp"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.webp 320w, Assets/Img/logo/logo-fondo-transparente-640.webp 640w"
                        sizes="(max-width: 760px) 44vw, 146px">
                    <img
                        src="Assets/Img/logo/logo-fondo-transparente-320.png"
                        alt="Isotipo transparente de SEIDO"
                        width="320"
                        height="288"
                        loading="eager"
                        decoding="async">
                </picture>
                
            </div>
            <p class="eyebrow">Pago no confirmado</p>
            <h1>Ha ocurrido un error de pago</h1>
            <p class="copy-muted">No se confirmo el pago. Puedes volver al check in y cambiar metodo de pago.</p>

            <div class="summary-block">
                <p><span>Referencia</span><strong id="errorReference">-</strong></p>
            </div>

            <a class="btn btn-primary section-mt-lg" href="checkin.html">Volver a pedir y cambiar método de pago..</a>
            <a class="btn btn-ghost section-mt-xs" href="catalogo.html">Volver al catalogo..</a>
        </section>
    </main>

    <script src="Js/ui-enhancements.min.js" defer></script>
    <script src="Js/pago-error.min.js" defer></script>
</body>
</html>
