<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogo SEIDO para seleccionar productos y continuar a check in.">
    <meta name="theme-color" content="#7b5a2a">
    <meta property="og:title" content="SEIDO | Catalogo">
    <meta property="og:description" content="Selecciona productos, ajusta cantidades y continua al check in de SEIDO.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CO">
    <meta property="og:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <meta property="og:url" content="/catalogo.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SEIDO | Catalogo">
    <meta name="twitter:description" content="Haz tu pedido SEIDO con una experiencia de compra rapida y fluida.">
    <meta name="twitter:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <link rel="canonical" href="/catalogo.html">
    <link rel="icon" type="image/png" sizes="32x32" href="Assets/Img/logo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Assets/Img/logo/favicon-16.png">
    <link rel="apple-touch-icon" href="Assets/Img/logo/apple-touch-icon.png">
    <title>SEIDO | Catalogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.min.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="page-patterns" aria-hidden="true"></div>

    <main class="page-shell catalog-layout">
        <header class="page-header">
            <a class="brand" href="inicio.html" aria-label="Ir al inicio de SEIDO">
                <picture>
                    <source
                        type="image/avif"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.avif 320w, Assets/Img/logo/logo-fondo-transparente-640.avif 640w"
                        sizes="36px">
                    <source
                        type="image/webp"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.webp 320w, Assets/Img/logo/logo-fondo-transparente-640.webp 640w"
                        sizes="36px">
                    <img
                        src="Assets/Img/logo/logo-fondo-transparente-320.png"
                        alt="SEIDO logo"
                        width="320"
                        height="288"
                        loading="eager"
                        decoding="async">
                </picture>
                <span>SEIDO</span>
            </a>
            <a class="header-link" href="seido.html">SEIDO</a>
        </header>

        <section class="panel">
            <div class="brand-spotlight is-compact">
                <picture>
                    <source
                        type="image/avif"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.avif 320w, Assets/Img/logo/logo-fondo-transparente-640.avif 640w"
                        sizes="(max-width: 760px) 46vw, 152px">
                    <source
                        type="image/webp"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.webp 320w, Assets/Img/logo/logo-fondo-transparente-640.webp 640w"
                        sizes="(max-width: 760px) 46vw, 152px">
                   

            </div>
            <p class="eyebrow">Catalogo</p>
            <h1>Selecciona tus platillos</h1>
            <p class="copy-muted">Elige cantidad y continua al check in para confirmar envío.</p>

            <div class="filter-row" id="filterRow">
                <button class="chip is-active" type="button" data-filter="all" aria-pressed="true">Todo</button>
                <button class="chip" type="button" data-filter="ramen" aria-pressed="false">Ramen</button>
                <button class="chip" type="button" data-filter="roll" aria-pressed="false">Maki's</button>
                <button class="chip" type="button" data-filter="snack" aria-pressed="false">Extra</button>
            </div>

            <p class="status" id="catalogStatus" aria-live="polite"></p>
            <div class="catalog-grid" id="menuGrid"></div>
        </section>

        <section class="catalog-dock" aria-live="polite">
            <p><strong id="cartCount">0</strong> productos seleccionados · <strong id="cartTotal">$0</strong></p>
            <button class="btn btn-primary" id="toCheckinBtn" type="button" aria-label="Continuar al check in" disabled>Continuar a check in</button>
        </section>
    </main>

    <script src="Js/ui-enhancements.min.js" defer></script>
    <script src="Js/store.min.js" defer></script>
    <script src="Js/catalogo.min.js" defer></script>
</body>
</html>
