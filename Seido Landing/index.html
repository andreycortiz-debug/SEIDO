<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pantalla de carga de SEIDŌ.">
    <meta name="theme-color" content="#7b5a2a">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="/index.html">
    <link rel="icon" type="image/png" sizes="32x32" href="Assets/Img/logo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Assets/Img/logo/favicon-16.png">
    <link rel="apple-touch-icon" href="Assets/Img/logo/apple-touch-icon.png">
    <title>SEIDŌ | Cargando</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.min.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="loader-page">
    <div class="page-patterns" aria-hidden="true"></div>

    <section class="loader-card" aria-live="polite" aria-busy="true" role="status">
        <div class="loader-mark">
            <span class="loader-orbit" aria-hidden="true"></span>
        </div>
        <p class="eyebrow">Cargando...</p>
        <div class="loader-track" aria-hidden="true">
            <span id="loaderFill"></span>
        </div>
        <ul class="loader-steps" id="loaderSteps" aria-hidden="true">
            <li data-loader-step="0" class="is-active">Orden</li>
            <li data-loader-step="1">Corte</li>
            <li data-loader-step="2">!Fuego! </li>
        </ul>
        <p class="loader-note" id="loaderNote">TODO LISTO</p>
    </section>

  </script>
    <script src="Js/loader.min.js" defer></script>
</body>
</html>
