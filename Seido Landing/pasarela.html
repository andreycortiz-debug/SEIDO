<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pasarela de pago SEIDO.">
    <meta name="theme-color" content="#7b5a2a">
    <meta property="og:title" content="SEIDO | Pasarela de pago">
    <meta property="og:description" content="Confirma el resultado de tu pago para finalizar el pedido en SEIDO.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CO">
    <meta property="og:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <meta property="og:url" content="/pasarela.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SEIDO | Pasarela de pago">
    <meta name="twitter:description" content="Confirma rapidamente el estado de tu pago en SEIDO.">
    <meta name="twitter:image" content="/Assets/Img/logo/logo-fondo-blanco-640.png">
    <link rel="canonical" href="/pasarela.html">
    <link rel="icon" type="image/png" sizes="32x32" href="Assets/Img/logo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Assets/Img/logo/favicon-16.png">
    <link rel="apple-touch-icon" href="Assets/Img/logo/apple-touch-icon.png">
    <title>SEIDŌ | Pasarela</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.min.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="page-patterns" aria-hidden="true"></div>

    <main class="thanks-main">
        <section class="thanks-card panel-prominent">
            <div class="brand-spotlight is-compact">
                <picture>
                    <source
                        type="image/avif"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.avif 320w, Assets/Img/logo/logo-fondo-transparente-640.avif 640w"
                        sizes="(max-width: 760px) 44vw, 146px">
                    <source
                        type="image/webp"
                        srcset="Assets/Img/logo/logo-fondo-transparente-320.webp 320w, Assets/Img/logo/logo-fondo-transparente-640.webp 640w"
                        sizes="(max-width: 760px) 44vw, 146px">
                    <img
                        src="Assets/Img/logo/logo-fondo-transparente-320.png"
                        alt="Isotipo transparente de SEIDO"
                        width="320"
                        height="288"
                        loading="eager"
                        decoding="async">
                </picture>
               
            </div>
            <p class="eyebrow">PSE</p>
            <h1 id="gatewayTitle">Confirmacion de pedido</h1>
            <p class="copy-muted" id="gatewayLead">Procesa tu pago y confirma el resultado.</p>

            <div class="summary-block">
                <p><span>Referencia</span><strong id="gatewayReference">-</strong></p>
                <p><span>Metodo</span><strong id="gatewayMethod">-</strong></p>
                <p><span>Estado actual</span><strong id="gatewayStatus">Pendiente</strong></p>
                <p><span>Pasarela externa</span><strong id="gatewayExternal">No configurada</strong></p>
            </div>

            <button id="openGatewayBtn" class="btn btn-ghost section-mt-md" type="button">Abrir pasarela externa</button>
            <button id="confirmSuccessBtn" class="btn btn-primary section-mt-xs" type="button">Confirmar pago exitoso</button>
            <button id="confirmFailBtn" class="btn btn-ghost section-mt-xs" type="button">Reportar pago fallido</button>
            <p class="status" id="gatewayMessage" aria-live="polite"></p>
        </section>
    </main>

    <script src="Js/ui-enhancements.min.js" defer></script>
    <script src="Js/store.min.js" defer></script>
    <script src="Js/pasarela.min.js" defer></script>
</body>
</html>
